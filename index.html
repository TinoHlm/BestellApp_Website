<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="./assets/icons/favicon.ico" />
    <link rel="stylesheet" href="./styles/standard.css" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./styles/fonts.css" />
    <link rel="stylesheet" href="./styles/assets.css" />
    <link rel="stylesheet" href="./styles/mobile.css" />
    <title>BurgerHouse</title>
  </head>
  <body id="home" onload="init()">
    <header>
      <div id="header-content">
        <a href="#home">
          <img src="./assets/imgs/Logo 02.png" alt="BestellApp Logo" />
        </a>

        <div class="burger-menu" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </header>

    <main>
      <section id="hero-section">
        <img id="hero-img" src="./assets/imgs/hero.png" alt="Hero Image" />
        <div class="hero-content">
          <img
            id="hero-logo"
            src="./assets/imgs/logo_burger.png"
            alt="BurgerHouse Logo"
          />
          <div class="product-rating">
            <h1><span class="highlight">Burger</span>House</h1>
            <div id="rating-container">
              <span id="star-icon">★</span>
              <span id="rating-value">4,1</span>
              <span id="rating-count">(317)</span>
            </div>
          </div>
          <p>The best of Burgers, Pizza, and Greens, all in one great place.</p>
        </div>
      </section>

      <section id="menu">
        <div id="menu-content" class="menu-content"></div>
      </section>

      <section id="cart" onclick="showCart()">
        <button class="cart-close-button" onclick="event.stopPropagation(); hideCart()">&times;</button>
        <h2>Your Basket</h2>
        <div id="cart-content" onclick="event.stopPropagation()"></div>
      </section>
    </main>

    <dialog id="order-confirmation-dialog" class="order-dialog" onclick="closeOrderConfirmation()"></dialog>

    <dialog id="remove-confirmation-dialog" class="remove-dialog" onclick="closeRemoveConfirmation()"></dialog>
    <footer>
      <div class="footer-content">
        <p>© 2026 BurgerHouse</p>
        <a href="#">Imprint</a>
        <a href="#">Cookie Preferences</a>
      </div>
    </footer>

    <nav class="bottom-nav">
      <button class="bottom-nav-item" aria-label="Home">
        <img src="./assets/icons/home_icon.png" alt="Home" />
      </button>
      <button class="bottom-nav-item" aria-label="Profile">
        <img src="./assets/icons/person_icon.png" alt="Profile" />
      </button>
      <button class="bottom-nav-item" aria-label="Menu">
        <img src="./assets/icons/takeout_dining_icon.png" alt="Menu" />
      </button>
      <button class="bottom-nav-item" aria-label="Basket" onclick="showCart()">
        <img src="./assets/icons/shopping_cart_icon.png" alt="Basket" />
      </button>
    </nav>

    <script src="./scripts/db.js"></script>
    <script src="./scripts/themplate.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
